<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>からあげクン 販売進捗ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8313A;
    --red-light: #FDECED;
    --orange: #F97316;
    --orange-light: #FFF7ED;
    --green: #16A34A;
    --green-light: #DCFCE7;
    --blue: #2563EB;
    --blue-light: #EFF6FF;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-400: #9CA3AF;
    --gray-600: #4B5563;
    --gray-800: #1F2937;
    --gray-900: #111827;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--gray-50);
    color: var(--gray-900);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--white);
    border-bottom: 3px solid var(--red);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .chicken-icon {
    width: 40px; height: 40px;
    background: var(--red);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header-title h1 { font-size: 15px; font-weight: 900; color: var(--gray-900); }
  .header-title p  { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
  .update-badge {
    background: var(--red-light); color: var(--red);
    font-size: 11px; font-weight: 700;
    padding: 5px 10px; border-radius: 20px;
    border: 1px solid #FCA5A5;
    white-space: nowrap;
  }

  /* ===== MAIN ===== */
  main { padding: 16px; max-width: 900px; margin: 0 auto; }

  /* ===== SUMMARY CARDS ===== */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .summary-card {
    background: var(--white);
    border-radius: 14px;
    padding: 14px 16px;
    border: 1px solid var(--gray-200);
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .summary-card .label { font-size: 11px; color: var(--gray-400); font-weight: 500; margin-bottom: 6px; }
  .summary-card .value { font-size: 26px; font-weight: 900; font-family: 'DM Mono', monospace; letter-spacing: -1px; }
  .summary-card .sub   { font-size: 11px; color: var(--gray-400); margin-top: 3px; }
  .card-red    .value { color: var(--red); }
  .card-orange .value { color: var(--orange); }
  .card-green  .value { color: var(--green); }
  .card-blue   .value { color: var(--blue); }

  /* ===== VISUAL SECTION ===== */
  .visual-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }
  .chart-card {
    background: var(--white);
    border-radius: 14px;
    border: 1px solid var(--gray-200);
    padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .chart-card h3 { font-size: 13px; font-weight: 700; color: var(--gray-800); margin-bottom: 3px; }
  .chart-card p  { font-size: 10px; color: var(--gray-400); margin-bottom: 14px; }

  /* SC SUMMARY BARS */
  .sc-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .sc-name { font-size: 11px; font-weight: 700; min-width: 90px; }
  .sc-bar-wrap { flex: 1; }
  .sc-bar-bg {
    height: 22px; background: var(--gray-100);
    border-radius: 6px; overflow: hidden;
    display: flex;
  }
  .sc-bar-sold {
    height: 100%; display: flex; align-items: center; padding-left: 6px;
    font-size: 10px; font-weight: 700; color: white;
    font-family: 'DM Mono', monospace;
    transition: width 0.8s;
    border-radius: 6px 0 0 6px;
    white-space: nowrap; overflow: hidden;
  }
  .sc-bar-remain {
    height: 100%; display: flex; align-items: center;
    justify-content: flex-end; padding-right: 5px;
    font-size: 9px; color: var(--gray-400);
    font-family: 'DM Mono', monospace;
    white-space: nowrap; overflow: hidden;
  }
  .sc-stats { font-size: 10px; color: var(--gray-400); min-width: 52px; text-align: right; font-family: 'DM Mono', monospace; }

  /* DONUT */
  .donut-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .donut-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .donut-wrap { position: relative; width: 64px; height: 64px; }
  .donut-wrap svg { width: 64px; height: 64px; }
  .donut-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .donut-pct   { font-size: 12px; font-weight: 900; font-family: 'DM Mono', monospace; }
  .donut-label { font-size: 9px; font-weight: 700; color: var(--gray-700); text-align: center; max-width: 64px; line-height: 1.3; }
  .donut-sub   { font-size: 9px; color: var(--gray-400); text-align: center; }

  /* ===== STORE LIST SECTION ===== */
  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .list-header h2 { font-size: 14px; font-weight: 700; color: var(--gray-800); }

  /* フィルターボタン */
  .filter-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 14px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--gray-200);
    background: var(--white);
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--gray-600);
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .filter-btn:hover { border-color: var(--red); color: var(--red); }
  .filter-btn.active { background: var(--red); border-color: var(--red); color: white; }

  /* ===== STORE CARDS ===== */
  .store-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

  .store-card {
    background: var(--white);
    border-radius: 14px;
    border: 1px solid var(--gray-200);
    padding: 14px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    animation: fadeUp 0.3s ease both;
  }
  .store-card.achieved {
    border-color: #86EFAC;
    background: linear-gradient(135deg, #fff 60%, #f0fdf4);
  }

  /* カード上段: SC名 + 店舗名 + 達成バッジ */
  .card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .sc-badge {
    display: inline-block;
    padding: 3px 9px; border-radius: 10px;
    font-size: 10px; font-weight: 700; white-space: nowrap;
    flex-shrink: 0;
  }
  .sc-takahashi { background: #FEF3C7; color: #92400E; }
  .sc-fi        { background: #FCE7F3; color: #9D174D; }
  .sc-goshima   { background: #E0E7FF; color: #3730A3; }
  .sc-prakash   { background: #D1FAE5; color: #065F46; }
  .sc-biswas    { background: #DBEAFE; color: #1E40AF; }
  .sc-dahal     { background: #FEE2E2; color: #991B1B; }
  .sc-suraz     { background: #F3E8FF; color: #6B21A8; }
  .sc-santos    { background: #FFF3E0; color: #E65100; }

  .card-store-name {
    font-size: 15px; font-weight: 700;
    color: var(--gray-900); flex: 1;
  }
  .achieved-badge {
    background: var(--green); color: white;
    font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 8px;
    white-space: nowrap; flex-shrink: 0;
  }

  /* カード中段: 数値3列 */
  .card-nums {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 10px;
  }
  .num-cell {
    background: var(--gray-50);
    border-radius: 10px;
    padding: 8px 10px;
    text-align: center;
  }
  .num-cell .n-label { font-size: 10px; color: var(--gray-400); font-weight: 500; margin-bottom: 3px; }
  .num-cell .n-val   { font-size: 20px; font-weight: 900; font-family: 'DM Mono', monospace; line-height: 1; }
  .num-cell .n-unit  { font-size: 10px; color: var(--gray-400); }
  .n-target { color: var(--orange); }
  .n-sold   { color: var(--blue); }
  .n-remain { color: var(--red); }
  .n-remain.done { color: var(--green); }

  /* カード下段: 進捗バー */
  .card-bar-wrap { }
  .card-bar-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--gray-400);
    margin-bottom: 5px;
  }
  .card-bar-meta strong { font-family: 'DM Mono', monospace; }
  .card-bar-bg {
    height: 10px; background: var(--gray-100);
    border-radius: 6px; overflow: hidden;
  }
  .card-bar-fill {
    height: 100%; border-radius: 6px;
    transition: width 0.9s cubic-bezier(0.4,0,0.2,1);
  }

  /* ===== FOOTER ===== */
  .note {
    font-size: 11px; color: var(--gray-400);
    text-align: center; padding: 16px;
    border-top: 1px solid var(--gray-200);
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .summary-card, .chart-card { animation: fadeUp 0.4s ease both; }
  .summary-card:nth-child(1) { animation-delay: 0.05s; }
  .summary-card:nth-child(2) { animation-delay: 0.10s; }
  .summary-card:nth-child(3) { animation-delay: 0.15s; }
  .summary-card:nth-child(4) { animation-delay: 0.20s; }

  /* ===== PC 2列レイアウト ===== */
  @media (min-width: 640px) {
    main { padding: 24px 24px; }
    .summary-grid { grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .store-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .donut-grid { grid-template-columns: repeat(5, 1fr); }
    header { padding: 16px 24px; }
    .header-title h1 { font-size: 18px; }
  }
  @media (min-width: 900px) {
    .donut-grid { grid-template-columns: repeat(5, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="chicken-icon">🍗</div>
    <div class="header-title">
      <h1>からあげクン 販売進捗</h1>
      <p>阪口商店 全20店舗</p>
    </div>
  </div>
  <div class="update-badge">📅 4/7（火）18:00</div>
</header>

<main>

  <!-- サマリーカード -->
  <div class="summary-grid">
    <div class="summary-card card-red">
      <div class="label">🎯 販売数目標（合計）</div>
      <div class="value" id="totalTarget">-</div>
      <div class="sub">全店合計目標</div>
    </div>
    <div class="summary-card card-orange">
      <div class="label">📦 現在の販売数（合計）</div>
      <div class="value" id="totalSold">-</div>
      <div class="sub">18:00 時点</div>
    </div>
    <div class="summary-card card-blue">
      <div class="label">📊 あと必要な販売数</div>
      <div class="value" id="totalRemain">-</div>
      <div class="sub">目標達成まで残り</div>
    </div>
    <div class="summary-card card-green">
      <div class="label">✅ 全体進捗率</div>
      <div class="value" id="totalPct">-</div>
      <div class="sub">目標に対する達成率</div>
    </div>
  </div>

  <!-- SC別バー＋ドーナツ -->
  <div class="visual-section">
    <div class="chart-card">
      <h3>🏪 SC・ASC別 販売進捗バー</h3>
      <p>販売済（色）vs 残り（グレー）</p>
      <div id="sc-bars"></div>
    </div>
    <div class="chart-card">
      <h3>🍩 店舗別 達成率</h3>
      <p>各店舗の目標達成率</p>
      <div class="donut-grid" id="donuts"></div>
    </div>
  </div>

  <!-- 店舗カードリスト -->
  <div class="list-header">
    <h2>📋 店舗別 詳細進捗</h2>
  </div>

  <!-- フィルターボタン（横スクロール） -->
  <div class="filter-scroll">
    <button class="filter-btn active" onclick="filterSC('all', this)">全店</button>
    <button class="filter-btn" onclick="filterSC('高橋ＳＣ', this)">高橋SC</button>
    <button class="filter-btn" onclick="filterSC('フィSC', this)">フィSC</button>
    <button class="filter-btn" onclick="filterSC('五島ＳＣ', this)">五島SC</button>
    <button class="filter-btn" onclick="filterSC('プラカスSC', this)">プラカスSC</button>
    <button class="filter-btn" onclick="filterSC('ビスワスSC', this)">ビスワスSC</button>
    <button class="filter-btn" onclick="filterSC('ダハルSC', this)">ダハルSC</button>
    <button class="filter-btn" onclick="filterSC('スラズASC', this)">スラズASC</button>
    <button class="filter-btn" onclick="filterSC('サントスASC', this)">サントスASC</button>
  </div>

  <div class="store-list" id="storeList"></div>

  <div class="note">
    ※ データ基準：4/7（火）18:00 時点　／　作成：阪口商店
  </div>

</main>

<script>
const stores = [
  { sc: '高橋ＳＣ',   name: '五月ケ丘東',        makeTarget: 97,  sellTarget: 75,  dec: 70.4,  sold: 39 },
  { sc: 'フィSC',     name: '吹田垂水三丁目',     makeTarget: 57,  sellTarget: 45,  dec: 48.3,  sold: 53 },
  { sc: '五島ＳＣ',   name: '池田市役所前',       makeTarget: 69,  sellTarget: 61,  dec: 66.7,  sold: 60 },
  { sc: 'プラカスSC', name: '豊里六丁目',          makeTarget: 78,  sellTarget: 64,  dec: 58.1,  sold: 65 },
  { sc: 'ビスワスSC', name: '豊中服部西町三丁目',  makeTarget: 100, sellTarget: 91,  dec: 77.0,  sold: 78 },
  { sc: 'スラズASC',  name: '豊中原田南一丁目',    makeTarget: 116, sellTarget: 105, dec: 140.9, sold: 134 },
  { sc: 'サントスASC',name: '大道南一丁目',        makeTarget: 113, sellTarget: 107, dec: 83.6,  sold: 67 },
  { sc: '五島ＳＣ',   name: '吹田警察署前',        makeTarget: 112, sellTarget: 100, dec: 80.7,  sold: 77 },
  { sc: '高橋ＳＣ',   name: '江坂駅南口',          makeTarget: 239, sellTarget: 216, dec: 187.9, sold: 130 },
  { sc: 'プラカスSC', name: '東淀川大道南',         makeTarget: 118, sellTarget: 104, dec: 105.7, sold: 51 },
  { sc: 'ダハルSC',   name: '江坂東',              makeTarget: 134, sellTarget: 112, dec: 116.1, sold: 67 },
  { sc: 'フィSC',     name: '吹田豊津中学校前',    makeTarget: 147, sellTarget: 130, dec: 87.6,  sold: 68 },
  { sc: '五島ＳＣ',   name: '南金田二丁目',        makeTarget: 184, sellTarget: 165, dec: 142.1, sold: 95 },
  { sc: '高橋ＳＣ',   name: '新御堂筋上新田',      makeTarget: 147, sellTarget: 142, dec: 124.1, sold: 137 },
  { sc: '高橋ＳＣ',   name: '吹田青山台三丁目',    makeTarget: 173, sellTarget: 146, dec: 129.0, sold: 104 },
  { sc: 'ビスワスSC', name: '豊中服部元町一丁目',  makeTarget: 133, sellTarget: 118, dec: 106.6, sold: 64 },
  { sc: 'ダハルSC',   name: '豊中利倉東一丁目',    makeTarget: 124, sellTarget: 107, dec: 95.4,  sold: 66 },
  { sc: 'プラカスSC', name: '吹田朝日町',           makeTarget: 145, sellTarget: 136, dec: 127.9, sold: 71 },
  { sc: 'サントスASC',name: '東淀川豊里五丁目',     makeTarget: 128, sellTarget: 122, dec: 142.1, sold: 95 },
  { sc: 'スラズASC',  name: '箕面白島二丁目',       makeTarget: 160, sellTarget: 135, dec: 107.7, sold: 74 },
];

const scColorMap = {
  '高橋ＳＣ':   { cls: 'sc-takahashi', bar: '#D97706' },
  'フィSC':     { cls: 'sc-fi',        bar: '#DB2777' },
  '五島ＳＣ':   { cls: 'sc-goshima',   bar: '#4F46E5' },
  'プラカスSC': { cls: 'sc-prakash',   bar: '#059669' },
  'ビスワスSC': { cls: 'sc-biswas',    bar: '#2563EB' },
  'ダハルSC':   { cls: 'sc-dahal',     bar: '#DC2626' },
  'スラズASC':  { cls: 'sc-suraz',     bar: '#7C3AED' },
  'サントスASC':{ cls: 'sc-santos',    bar: '#EA580C' },
};

// ===== サマリー =====
const totalTarget = stores.reduce((s,x) => s + x.sellTarget, 0);
const totalSold   = stores.reduce((s,x) => s + x.sold, 0);
const totalRemain = Math.max(0, totalTarget - totalSold);
const totalPct    = (totalSold / totalTarget * 100).toFixed(1);

document.getElementById('totalTarget').textContent = totalTarget.toLocaleString();
document.getElementById('totalSold').textContent   = totalSold.toLocaleString();
document.getElementById('totalRemain').textContent = totalRemain.toLocaleString();
document.getElementById('totalPct').textContent    = totalPct + '%';

// ===== 店舗カード描画 =====
function buildCards(filter) {
  const list = document.getElementById('storeList');
  list.innerHTML = '';
  const filtered = filter === 'all' ? stores : stores.filter(s => s.sc === filter);

  filtered.forEach((s, i) => {
    const pct      = Math.min(100, s.sold / s.sellTarget * 100);
    const remain   = Math.max(0, s.sellTarget - s.sold);
    const isDone   = s.sold >= s.sellTarget;
    const color    = scColorMap[s.sc].bar;
    const barColor = pct >= 80 ? '#16A34A' : pct >= 50 ? '#F97316' : '#E8313A';

    const card = document.createElement('div');
    card.className = 'store-card' + (isDone ? ' achieved' : '');
    card.style.animationDelay = (i * 0.04) + 's';

    card.innerHTML = `
      <div class="card-top">
        <span class="sc-badge ${scColorMap[s.sc].cls}">${s.sc}</span>
        <span class="card-store-name">${s.name}</span>
        ${isDone ? '<span class="achieved-badge">🏆 達成！</span>' : ''}
      </div>
      <div class="card-nums">
        <div class="num-cell">
          <div class="n-label">🎯 販売目標</div>
          <div class="n-val n-target">${s.sellTarget}<span class="n-unit">個</span></div>
        </div>
        <div class="num-cell">
          <div class="n-label">📦 現在販売数</div>
          <div class="n-val n-sold">${s.sold}<span class="n-unit">個</span></div>
        </div>
        <div class="num-cell">
          <div class="n-label">⚡ 残り</div>
          <div class="n-val n-remain ${isDone ? 'done' : ''}">${isDone ? '0' : remain}<span class="n-unit">個</span></div>
        </div>
      </div>
      <div class="card-bar-wrap">
        <div class="card-bar-meta">
          <span>達成率 <strong style="color:${barColor}">${pct.toFixed(1)}%</strong></span>
          <span>${isDone ? '✅ 目標達成！' : 'あと <strong>' + remain + '個</strong> で達成'}</span>
        </div>
        <div class="card-bar-bg">
          <div class="card-bar-fill" data-pct="${pct}" style="width:0%;background:${barColor}"></div>
        </div>
      </div>
    `;
    list.appendChild(card);
  });

  // バーアニメーション
  setTimeout(() => {
    document.querySelectorAll('.card-bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 80);
}

buildCards('all');

function filterSC(sc, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildCards(sc);
}

// ===== SC別バー =====
const scGroups = {};
stores.forEach(s => {
  if (!scGroups[s.sc]) scGroups[s.sc] = { target: 0, sold: 0 };
  scGroups[s.sc].target += s.sellTarget;
  scGroups[s.sc].sold   += s.sold;
});

const scBarsEl = document.getElementById('sc-bars');
Object.entries(scGroups).forEach(([sc, data]) => {
  const pct    = Math.min(100, data.sold / data.target * 100);
  const remain = Math.max(0, data.target - data.sold);
  const color  = scColorMap[sc].bar;
  const div = document.createElement('div');
  div.className = 'sc-row';
  div.innerHTML = `
    <div class="sc-name"><span class="sc-badge ${scColorMap[sc].cls}">${sc}</span></div>
    <div class="sc-bar-wrap">
      <div class="sc-bar-bg">
        <div class="sc-bar-sold" style="width:${pct}%;background:${color}">${data.sold}個</div>
        <div class="sc-bar-remain">残${remain}</div>
      </div>
    </div>
    <div class="sc-stats">${pct.toFixed(1)}%<br><span style="font-size:9px">目標${data.target}</span></div>
  `;
  scBarsEl.appendChild(div);
});

// ===== ドーナツチャート =====
function makeDonut(pct, color) {
  const r    = 22;
  const circ = 2 * Math.PI * r;
  const dash = circ * Math.min(pct, 100) / 100;
  const gap  = circ - dash;
  const textColor = pct >= 100 ? '#16A34A' : pct >= 50 ? '#F97316' : '#E8313A';
  return `
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="${r}" fill="none" stroke="#F3F4F6" stroke-width="8"/>
      <circle cx="32" cy="32" r="${r}" fill="none" stroke="${color}" stroke-width="8"
        stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${circ * 0.25}"
        stroke-linecap="round"/>
    </svg>
    <div class="donut-center"><span class="donut-pct" style="color:${textColor}">${Math.round(pct)}%</span></div>
  `;
}

const donutsEl = document.getElementById('donuts');
stores.forEach(s => {
  const pct   = s.sold / s.sellTarget * 100;
  const color = scColorMap[s.sc].bar;
  const item  = document.createElement('div');
  item.className = 'donut-item';
  item.innerHTML = `
    <div class="donut-wrap">${makeDonut(pct, color)}</div>
    <div class="donut-label">${s.name}</div>
    <div class="donut-sub">${s.sold}／${s.sellTarget}</div>
  `;
  donutsEl.appendChild(item);
});
</script>
</body>
