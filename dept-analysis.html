.scope-btn.active{background:rgba(255,255,255,.25);border-color:#fff}

.filter-row{display:flex;gap:5px;flex-wrap:wrap;min-height:28px;align-items:center}

.filter-btn.active{background:#fff;color:#003087;font-weight:700}

.content{padding:16px;max-width:1400px;margin:0 auto}

.impact-bar-fill{height:100%;border-radius:7px;transition:width .5s}
.action-card{background:#f8f9ff;border-radius:10px;padding:12px;margin-bottom:10px;border-left:4px solid #003087}

// === State ===
let currentScope = 'whole'; // 'whole' | 'sc' | 'store'
let currentSC = null;
let currentStore = null;
let currentTab = 0;

// === Derived data ===
const SC_LIST = [...new Set(Object.values(STORES_RAW).map(s => s.sc))].sort();
const SC_STORES = {};
SC_LIST.forEach(sc => {
  SC_STORES[sc] = Object.keys(STORES_RAW).filter(k => STORES_RAW[k].sc === sc);
});

// 新店（前年データなし）を特定 — 前年比算出から除外する
const NEW_STORES = new Set(
  Object.keys(STORES_RAW).filter(name =>
    Object.values(STORES_RAW[name].depts).every(d => d.prevSales === 0)
  )
);

// === Utility ===
function fmt(n, unit='') {
  if (n == null) return '—';
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2) + 'M' + unit;
  if (Math.abs(n) >= 1e4) return Math.round(n/1e3) + 'K' + unit;
  return Math.round(n).toLocaleString() + unit;
}
function fmtPct(n) {
  if (n == null) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(1) + '%';
}
function pctClass(v, goodDir='up') {
  if (v == null) return '';
  if (goodDir === 'up') return v >= 100 ? 'up' : 'down';
  return v <= 100 ? 'up' : 'warn';
}

// Aggregate dept data from array of store names
// salesComp/prevSalesComp/wasteComp/prevWasteComp は新店を除外した比較可能分
function aggregateDepts(storeNames) {
  const result = {};
  storeNames.forEach(name => {
    const store = STORES_RAW[name];
    if (!store) return;
    const isNew = NEW_STORES.has(name);
    Object.entries(store.depts).forEach(([dept, d]) => {
      if (!result[dept]) result[dept] = {
        sales:0, prevSales:0, waste:0, prevWaste:0,
        salesComp:0, prevSalesComp:0, wasteComp:0, prevWasteComp:0,
        _isNew:false
      };
      result[dept].sales += d.sales;
      result[dept].prevSales += d.prevSales;
      result[dept].waste += d.waste;
      result[dept].prevWaste += d.prevWaste;
      // 新店は前年比算出用のcomp集計から除外
      if (!isNew) {
        result[dept].salesComp += d.sales;
        result[dept].prevSalesComp += d.prevSales;
        result[dept].wasteComp += d.waste;
        result[dept].prevWasteComp += d.prevWaste;
      }
    });
  });
  // 比較可能店舗がない（単独新店表示）場合のみ_isNew=true
  Object.entries(result).forEach(([dept,d]) => {
    if (d.prevSalesComp === 0 && d.salesComp === 0) d._isNew = true;
  });
  return result;
}

// Compute per-dept metrics
function computeDeptMetrics(deptData) {
  const rows = [];
  Object.entries(deptData).forEach(([dept, d]) => {
    const mr = DEPT_MR[dept];
    const isNew = d._isNew;

    // Sales YoY — comp（新店除外）ベースで算出
    let salesYoy = null;
    if (!isNew && d.prevSalesComp > 0) salesYoy = d.salesComp / d.prevSalesComp * 100;

    // Gross profit — 絶対値はsales全体、前年比はcomp（新店除外）ベース
    let gp = null, prevGp = null;
    if (mr != null) {
      gp = d.sales * mr / 100;
      if (!isNew && d.prevSalesComp > 0) prevGp = d.prevSalesComp * mr / 100;
    }
    let gpYoy = null;
    if (mr != null && !isNew && d.prevSalesComp > 0) {
      gpYoy = (d.salesComp / d.prevSalesComp) * 100;
    }

    // Waste YoY — comp（新店除外）ベース、前年売変が1000円未満は除外
    let wasteYoy = null;
    if (!isNew && d.prevWasteComp >= 1000) {
      wasteYoy = d.wasteComp / d.prevWasteComp * 100;
    }

    // Classification
    let cls = 'D';
    if (dept === 'たばこ') {
      cls = 'D';
    } else if (!isNew && salesYoy != null) {
      const salesDown = salesYoy < 100;
      const wasteWorse = wasteYoy != null && wasteYoy > 115;
      const gpWorse = gpYoy != null && gpYoy < 97;
      const problem = wasteWorse || gpWorse;
      if (salesDown && problem) cls = 'A';
      else if (!salesDown && problem) cls = 'B';
      else if (!salesDown && !problem) cls = 'C';
      else cls = 'D';
    } else {
      cls = 'D';
    }

    rows.push({dept, d, mr, isNew, salesYoy, gp, prevGp, gpYoy, wasteYoy, cls});
  });
  return rows;
}

// Summary totals
// sales/waste は新店込み絶対値、salesComp/wasteComp 系は新店除外の前年比用
function computeSummary(deptData) {
  let sales=0, prevSales=0, waste=0, prevWaste=0, gp=0, prevGp=0;
  let salesComp=0, prevSalesComp=0, wasteComp=0, prevWasteComp=0, gpComp=0;
  let salesUpCount=0;
  Object.entries(deptData).forEach(([dept, d]) => {
    const mr = DEPT_MR[dept];
    sales += d.sales;
    prevSales += d.prevSales;
    waste += d.waste;
    if (d.prevWaste > 0) prevWaste += d.prevWaste;
    salesComp += d.salesComp;
    prevSalesComp += d.prevSalesComp;
    wasteComp += d.wasteComp;
    if (d.prevWasteComp > 0) prevWasteComp += d.prevWasteComp;
    if (mr != null) {
      gp += d.sales * mr / 100;
      gpComp += d.salesComp * mr / 100;
      if (!d._isNew && d.prevSalesComp > 0) prevGp += d.prevSalesComp * mr / 100;
    }
    if (!d._isNew && d.prevSalesComp > 0 && d.salesComp >= d.prevSalesComp) salesUpCount++;
  });
  return {sales,prevSales,waste,prevWaste,gp,prevGp,
          salesComp,prevSalesComp,wasteComp,prevWasteComp,gpComp,
          salesUpCount};
}

function render() {
  renderHeader();
  renderContent();
}

function renderHeader() {
  // Tab row
  const tabs = ['① 中間検証','② 優先分類','③ 荒利インパクト','④ アクション提案'];
  const tabRow = document.getElementById('tabRow');
  tabRow.innerHTML = tabs.map((t,i) =>
    `<button class="tab-btn ${i===currentTab?'active':''}" onclick="setTab(${i})">${t}</button>`
  ).join('');

  // Scope row
  const scopeRow = document.getElementById('scopeRow');
  const scopes = [['whole','全体'],['sc','SC別'],['store','個店別']];
  scopeRow.innerHTML = '<span class="scope-label">スコープ：</span>' +
    scopes.map(([v,l]) =>
      `<button class="scope-btn ${currentScope===v?'active':''}" onclick="setScope('${v}')">${l}</button>`
    ).join('');

  // Filter row
  renderFilterRow();
}

function renderFilterRow() {
  const filterRow = document.getElementById('filterRow');
  if (currentScope === 'whole') {
    filterRow.innerHTML = '';
    return;
  }
  if (currentScope === 'sc') {
    filterRow.innerHTML = SC_LIST.map(sc =>
      `<button class="filter-btn ${currentSC===sc?'active':''}" onclick="setSC('${sc}')">${sc}</button>`
    ).join('');
    return;
  }
  // store scope
  let html = '<span class="filter-sub">SC：</span>' + SC_LIST.map(sc =>
    `<button class="filter-btn ${currentSC===sc?'active':''}" onclick="setScForStore('${sc}')">${sc}</button>`
  ).join('') + '&nbsp;&nbsp;';
  if (currentSC) {
    html += '<span class="filter-sub" style="margin-left:8px">店舗：</span>' +
      (SC_STORES[currentSC]||[]).map(s =>
        `<button class="filter-btn ${currentStore===s?'active':''}" onclick="setStore('${s}')">${s}</button>`
      ).join('');
  }
  filterRow.innerHTML = html;
}

function renderContent() {
  const content = document.getElementById('mainContent');

  if (currentScope === 'whole') {
    renderWhole(content);
    return;
  }

  let storeNames = [];
  let label = '';
  if (currentScope === 'sc') {
    if (!currentSC) {
      content.innerHTML = '<div class="empty-msg">SCを選択してください</div>';
      return;
    }
    storeNames = SC_STORES[currentSC] || [];
    label = currentSC;
  } else {
    if (!currentSC || !currentStore) {
      content.innerHTML = '<div class="empty-msg">SC・店舗を選択してください</div>';
      return;
    }
    storeNames = [currentStore];
    label = currentStore;
  }

  const deptData = aggregateDepts(storeNames);
  const rows = computeDeptMetrics(deptData);
  const summary = computeSummary(deptData);

  const panels = [
    renderTab0(rows, summary, label, storeNames),
    renderTab1(rows, label),
    renderTab2(rows, summary, label),
    renderTab3(rows, label)
  ];

  content.innerHTML = panels.map((html,i) =>
    `<div class="tab-panel ${i===currentTab?'active':''}">${html}</div>`
  ).join('');
}

function renderWhole(content) {
  // Aggregate all stores
  const allStores = Object.keys(STORES_RAW);
  const deptData = aggregateDepts(allStores);
  const s = computeSummary(deptData);
  // 前年比は新店除外のcomp値で算出
  const salesYoy = s.prevSalesComp > 0 ? (s.salesComp/s.prevSalesComp*100) : null;
  const gpYoy = s.prevGp > 0 ? (s.gpComp/s.prevGp*100) : null;
  const wasteYoy = s.prevWasteComp > 0 ? (s.wasteComp/s.prevWasteComp*100) : null;
  const newStoreNames = [...NEW_STORES].join('、');

  content.innerHTML = `

function renderTab0(rows, summary, label, storeNames) {
  const s = summary;
  // 前年比は新店除外のcomp値で算出
  const salesYoy = s.prevSalesComp > 0 ? (s.salesComp/s.prevSalesComp*100) : null;
  const gpYoy = s.prevGp > 0 ? (s.gpComp/s.prevGp*100) : null;
  const wasteYoy = s.prevWasteComp > 0 ? (s.wasteComp/s.prevWasteComp*100) : null;
  const newInScope = storeNames.filter(n => NEW_STORES.has(n));
  const newStoreNote = newInScope.length > 0
    ? `<br>※ <strong>前年比は新店（${newInScope.join('、')}）を除いた比較可能店舗ベース</strong>で算出しています。`
    : '';

  // Pattern analysis
  const pattUpSales = rows.filter(r => r.salesYoy != null && r.salesYoy >= 100 && r.dept !== 'たばこ');
  const pattDownSales = rows.filter(r => r.salesYoy != null && r.salesYoy < 100 && r.dept !== 'たばこ');
  const pattWasteUp = rows.filter(r => r.wasteYoy != null && r.wasteYoy > 115);
  const pattComplex = rows.filter(r => r.cls === 'A');

  const tableRows = rows.map(r => {
    const {dept, d, mr, isNew, salesYoy, gp, prevGp, gpYoy, wasteYoy, cls} = r;
    const isFF = (dept === 'ファストフーズ' || dept === '店内厨房');

    const salesYoyTxt = isNew ? '<span style="color:#888">—（新店）</span>' :
      (salesYoy != null ? `<span class="${pctClass(salesYoy,'up')}">${salesYoy.toFixed(1)}%</span>` : '—');

    const gpTxt = mr == null ? '<span style="color:#aaa">算出不可</span>' :
      (gp != null ? fmt(Math.round(gp)) : '—');
    const prevGpTxt = mr == null ? '—' :
      (isNew ? '—' : (prevGp != null ? fmt(Math.round(prevGp)) : '—'));
    const gpYoyTxt = mr == null ? '—' :
      (isNew ? '<span style="color:#888">—（新店）</span>' :
        (gpYoy != null ? `<span class="${pctClass(gpYoy,'up')}">${gpYoy.toFixed(1)}%</span>` : '—'));

    const mrTxt = mr != null ? mr.toFixed(2)+'%' : '<span style="color:#aaa">—</span>';

    let wastePrevTxt, wasteYoyTxt;
    if (isNew) {
      wastePrevTxt = '—';
      wasteYoyTxt = '<span style="color:#888">—（新店）</span>';
    } else if (d.prevWaste < 0) {
      wastePrevTxt = '<span style="color:#aaa">' + d.prevWaste.toLocaleString() + '</span>';
      wasteYoyTxt = '<span style="color:#aaa">—</span>';
    } else if (d.prevWaste === 0 || d.prevWaste < 1000) {
      wastePrevTxt = d.prevWaste === 0 ? '0' : d.prevWaste.toLocaleString();
      wasteYoyTxt = '<span style="color:#aaa">—</span>';
    } else {
      wastePrevTxt = d.prevWaste.toLocaleString();
      wasteYoyTxt = wasteYoy != null ? `<span class="${pctClass(wasteYoy,'down')}">${wasteYoy.toFixed(1)}%</span>` : '—';
    }

    return `<tr>
      <td style="text-align:left;font-weight:600">${dept}</td>
      <td><span class="cat-tag">${DEPT_CATEGORY[dept]||'—'}</span></td>
      <td>${d.sales.toLocaleString()}</td>
      <td>${isNew?'—':d.prevSales.toLocaleString()}</td>
      <td>${salesYoyTxt}</td>
      <td>${gpTxt}</td>
      <td>${prevGpTxt}</td>
      <td>${gpYoyTxt}</td>
      <td>${mrTxt}</td>
      <td>${d.waste.toLocaleString()}</td>
      <td>${wastePrevTxt}</td>
      <td>${wasteYoyTxt}</td>
      <td><span class="badge badge-${cls}">${cls}</span></td>
    </tr>`;
  }).join('');

  return `
    <div class="card-grid">
      <div class="card blue">
        <div class="card-label">売上合計</div>
        <div class="card-value">${fmt(s.sales)}</div>
        <div class="card-sub">前年 ${fmt(s.prevSales)} ／ 比 ${salesYoy!=null?salesYoy.toFixed(1)+'%':'—'}</div>
      </div>
      <div class="card green">
        <div class="card-label">荒利合計（MR推計）</div>
        <div class="card-value">${fmt(s.gp)}</div>
        <div class="card-sub">前年 ${fmt(s.prevGp)} ／ 比 ${gpYoy!=null?gpYoy.toFixed(1)+'%':'—'}</div>
      </div>
      <div class="card ${wasteYoy!=null&&wasteYoy>110?'red':'amber'}">
        <div class="card-label">売変合計</div>
        <div class="card-value">${fmt(s.waste)}</div>
        <div class="card-sub">前年 ${fmt(s.prevWaste)} ／ 比 ${wasteYoy!=null?wasteYoy.toFixed(1)+'%':'—'}</div>
      </div>
      <div class="card teal">
        <div class="card-label">売上UP DEPT数</div>
        <div class="card-value">${s.salesUpCount}</div>
        <div class="card-sub">全${rows.length}DEPTのうち</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">DEPT別一覧（${label}）</div>
      <div class="note">
        荒利=売上×MR÷100で推計。FF・厨房はMR非設定のため算出不可。<br>
        売上前年比：<span class="up">緑=100%以上</span> / <span class="down">赤=100%未満</span>
        売変前年比：<span class="warn">橙=115%超（悪化）</span> / <span class="up">緑=100%以下（改善）</span>
        ※前年売変が負値・1000円未満の場合は比率「—」${newStoreNote}
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="text-align:left">DEPT</th><th>カテゴリ</th>
            <th>売上</th><th>前年売上</th><th>売上前年比</th>
            <th>荒利</th><th>前年荒利</th><th>荒利前年比</th><th>荒利率</th>
            <th>売変</th><th>前年売変</th><th>売変前年比</th>
            <th>分類</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <div class="section-title">パターン別まとめ</div>
      <div class="pattern-grid">
        <div class="pattern-card up-sales">
          <div class="pattern-card-title">売上UP（${pattUpSales.length}DEPT）</div>
          <div class="pattern-dept-list">${pattUpSales.map(r=>r.dept).join('、') || '—'}</div>
        </div>
        <div class="pattern-card down-sales">
          <div class="pattern-card-title">売上DOWN（${pattDownSales.length}DEPT）</div>
          <div class="pattern-dept-list">${pattDownSales.map(r=>r.dept).join('、') || '—'}</div>
        </div>
        <div class="pattern-card waste-up">
          <div class="pattern-card-title">売変悪化（${pattWasteUp.length}DEPT）</div>
          <div class="pattern-dept-list">${pattWasteUp.map(r=>r.dept).join('、') || '—'}</div>
        </div>
        <div class="pattern-card complex">
          <div class="pattern-card-title">複合課題A（${pattComplex.length}DEPT）</div>
          <div class="pattern-dept-list">${pattComplex.map(r=>r.dept).join('、') || '—'}</div>
        </div>
      </div>
    </div>
  `;
}

function renderTab1(rows, label) {
  const groups = {A:[],B:[],C:[],D:[]};
  rows.forEach(r => groups[r.cls].push(r));

  const descA = '売上ダウン＋売変悪化または荒利低下：最優先改善';
  const descB = '売上UPだが売変悪化または荒利低下：効率改善';
  const descC = '売上UP・売変・荒利とも良好：維持強化';
  const descD = '前年比不明・凸凹あり（新店・たばこ含む）';

  function abcdCard(cls, depts, desc) {
    return `<div class="abcd-card ${cls}">
      <div class="abcd-title">${cls}：${desc}</div>
      ${depts.length === 0
        ? '<div style="color:#aaa;font-size:12px">該当なし</div>'
        : depts.map(r => {
          const parts = [];
          if (r.salesYoy != null && r.salesYoy < 100) parts.push(`売上${r.salesYoy.toFixed(0)}%`);
          if (r.wasteYoy != null && r.wasteYoy > 115) parts.push(`売変${r.wasteYoy.toFixed(0)}%`);
          if (r.gpYoy != null && r.gpYoy < 97) parts.push(`荒利${r.gpYoy.toFixed(0)}%`);
          return `<div class="abcd-dept">${r.dept}${parts.length>0?' <span style="font-size:10px;color:#888">('+parts.join('/')+')</span>':''}</div>`;
        }).join('')}
    </div>`;
  }

  return `
    <div class="section">
      <div class="section-title">優先分類（${label}）</div>
      <div class="note">
        <strong>A</strong>：売上前年比＜100% かつ 売変前年比＞115% または 荒利前年比＜97%　→ 最優先<br>
        <strong>B</strong>：売上前年比≥100% かつ 売変前年比＞115% または 荒利前年比＜97%　→ 効率改善<br>
        <strong>C</strong>：売上前年比≥100% かつ 売変・荒利とも良好　→ 維持・強化<br>
        <strong>D</strong>：前年比不明・新店・たばこ等　→ 参考値
      </div>
      <div class="abcd-grid">
        ${abcdCard('A', groups.A, descA)}
        ${abcdCard('B', groups.B, descB)}
        ${abcdCard('C', groups.C, descC)}
        ${abcdCard('D', groups.D, descD)}
      </div>
    </div>
  `;
}

function renderTab2(rows, summary, label) {
  // Gross profit composition (top 10 excl FF/厨房)
  const gpRows = rows.filter(r => r.gp != null && r.mr != null)
    .sort((a,b) => b.gp - a.gp).slice(0, 10);
  const maxGp = gpRows[0] ? gpRows[0].gp : 1;

  // Waste ranking (top 10, all depts)
  const wasteRows = rows.filter(r => r.d.waste > 0).sort((a,b) => b.d.waste - a.d.waste).slice(0,10);
  const maxWaste = wasteRows[0] ? wasteRows[0].d.waste : 1;

  // Waste/GP ratio (depts with both)
  const ratioRows = rows.filter(r => r.gp != null && r.gp > 0 && r.mr != null)
    .map(r => ({...r, ratio: r.d.waste / r.gp * 100}))
    .sort((a,b) => b.ratio - a.ratio).slice(0, 10);

  function barColor(pct) {
    if (pct >= 80) return '#e53935';
    if (pct >= 50) return '#f57c00';
    return '#1565c0';
  }

  return `
    <div class="two-col">
      <div class="section">
        <div class="section-title">荒利構成比 上位DEPT（${label}）</div>
        ${gpRows.map(r => {
          const pct = r.gp / maxGp * 100;
          const totalGp = summary.gp || 1;
          const share = r.gp / totalGp * 100;
          return `<div class="impact-bar-wrap">
            <div class="impact-bar-label">
              <span>${r.dept}</span>
              <span style="color:#555">${fmt(Math.round(r.gp))}円 (${share.toFixed(1)}%)</span>
            </div>
            <div class="impact-bar"><div class="impact-bar-fill" style="width:${pct.toFixed(1)}%;background:#1565c0"></div></div>
          </div>`;
        }).join('')}
      </div>

      <div class="section">
        <div class="section-title">売変額ランキング（${label}）</div>
        ${wasteRows.map(r => {
          const pct = r.d.waste / maxWaste * 100;
          const yoyTxt = r.wasteYoy != null ? ` 前年比${r.wasteYoy.toFixed(0)}%` : '';
          return `<div class="impact-bar-wrap">
            <div class="impact-bar-label">
              <span>${r.dept}</span>
              <span style="color:#555">${fmt(r.d.waste)}円${yoyTxt}</span>
            </div>
            <div class="impact-bar"><div class="impact-bar-fill" style="width:${pct.toFixed(1)}%;background:${r.wasteYoy!=null&&r.wasteYoy>115?'#e53935':'#f57c00'}"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="section">
      <div class="section-title">売変／荒利 比率 上位DEPT（${label}）</div>
      <div class="note">荒利に対する売変の割合。高いほど荒利を食いつぶしている。</div>
      ${ratioRows.map(r => {
        const pct = Math.min(r.ratio, 100);
        return `<div class="impact-bar-wrap">
          <div class="impact-bar-label">
            <span>${r.dept}</span>
            <span style="color:#555">売変/荒利 ${r.ratio.toFixed(1)}%（売変${fmt(r.d.waste)}円 / 荒利${fmt(Math.round(r.gp))}円）</span>
          </div>
          <div class="impact-bar"><div class="impact-bar-fill" style="width:${pct.toFixed(1)}%;background:${barColor(r.ratio)}"></div></div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function renderTab3(rows, label) {
  const priority = rows.filter(r => r.cls === 'A' || r.cls === 'B')
    .sort((a,b) => {
      if (a.cls !== b.cls) return a.cls < b.cls ? -1 : 1;
      // Sort by impact: waste amount desc
      return b.d.waste - a.d.waste;
    });

  if (priority.length === 0) {
    return `<div class="section"><div class="section-title">アクション提案（${label}）</div>
      <div class="empty-msg">分類A・Bに該当するDEPTがありません。良好な状態です。</div></div>`;
  }

  const cards = priority.map(r => {
    const issues = [];
    if (r.salesYoy != null && r.salesYoy < 100) issues.push(`売上前年比${r.salesYoy.toFixed(1)}%（ダウン）`);
    if (r.wasteYoy != null && r.wasteYoy > 115) issues.push(`売変前年比${r.wasteYoy.toFixed(1)}%（悪化）`);
    if (r.gpYoy != null && r.gpYoy < 97) issues.push(`荒利前年比${r.gpYoy.toFixed(1)}%（低下）`);
    const actions = ACTION_DICT[r.dept] || ['発注量・品種構成の見直し','売場陳列の改善'];
    return `<div class="action-card">
      <div class="action-dept"><span class="badge badge-${r.cls}">${r.cls}</span>&nbsp;${r.dept}</div>
      <div class="action-issue">課題：${issues.join(' / ') || '詳細確認要'}</div>
      <ul class="action-list">${actions.map(a=>`<li>${a}</li>`).join('')}</ul>
    </div>`;
  }).join('');

  return `<div class="section">
    <div class="section-title">アクション提案（${label}）</div>
    <div class="note">分類A（最優先）・B（効率改善）のDEPTを対象に、DEPT特性に基づくアクションを表示しています。</div>
    ${cards}
  </div>`;
}

// === State setters ===
function setTab(i) {
  currentTab = i;
  render();
}
function setScope(s) {
  currentScope = s;
  if (s === 'whole') { currentSC = null; currentStore = null; }
  if (s === 'sc') { currentStore = null; if (!SC_LIST.includes(currentSC)) currentSC = null; }
  render();
}
function setSC(sc) {
  currentSC = sc;
  currentStore = null;
  render();
}
function setScForStore(sc) {
  currentSC = sc;
  currentStore = null;
  render();
}
function setStore(s) {
  currentStore = s;
  render();
}

// Initial render
render();
</script>
</body>
</html>
