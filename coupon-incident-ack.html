<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>クーポン不正防止 確認・誓約書 / Coupon Fraud Prevention Pledge</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--blue:#005BAC;--blue-d:#004080;--green:#00A651;--red:#E53E3E;--gray:#6B7280;--bg:#F3F4F6;--border:#E5E7EB;--warn:#B91C1C}
  body{font-family:-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;background:var(--bg);color:#1F2937;line-height:1.6;-webkit-text-size-adjust:100%}
  .wrap{max-width:600px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column}
  header{background:var(--blue);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10}
  header .t1{font-size:17px;font-weight:800;letter-spacing:.3px;text-align:center}
  header .t2{font-size:11px;opacity:.9;margin-top:2px;text-align:center}
  .langbar{display:flex;gap:6px;margin-top:10px;justify-content:center;flex-wrap:wrap}
  .langbar button{flex:1;min-width:70px;padding:8px 4px;font-size:13px;font-weight:700;border:2px solid rgba(255,255,255,.5);background:transparent;color:#fff;border-radius:8px;cursor:pointer}
  .langbar button.on{background:#fff;color:var(--blue);border-color:#fff}
  .content{padding:16px;flex:1}
  .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .label{font-weight:700;font-size:15px;margin-bottom:2px}
  .hint{font-size:12px;color:var(--gray);margin:4px 0 10px}
  input[type=text],input[type=tel]{width:100%;padding:14px;font-size:18px;border:2px solid var(--border);border-radius:10px;text-align:center;letter-spacing:2px}
  input:focus{outline:none;border-color:var(--blue)}
  .btn{display:block;width:100%;padding:15px;font-size:16px;font-weight:700;border:none;border-radius:10px;cursor:pointer;text-align:center}
  .btn-primary{background:var(--blue);color:#fff}
  .btn-primary:disabled{background:#9CA3AF;cursor:not-allowed}
  .btn-green{background:var(--green);color:#fff}
  .btn-green:disabled{background:#9CA3AF;cursor:not-allowed}
  .alertbox{background:#FEF2F2;border:2px solid var(--warn);border-radius:12px;padding:14px;margin-bottom:14px}
  .alertbox .ah{font-size:16px;font-weight:800;color:var(--warn)}
  .alertbox .ab{font-size:13px;color:#374151;margin-top:6px}
  .me{background:#F0FDF4;border:1px solid var(--green);border-radius:10px;padding:12px;margin-bottom:14px}
  .me .nm{font-size:18px;font-weight:800}
  .me .sb{font-size:13px;color:var(--gray)}
  .doc{margin-bottom:16px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .doc .dh{background:#F9FAFB;padding:10px 12px;font-weight:700;font-size:13px;border-bottom:1px solid var(--border)}
  .doc img{width:100%;display:block;cursor:zoom-in}
  .doc .zoom{font-size:11px;color:var(--blue);text-align:center;padding:6px;background:#F9FAFB}
  .chk{display:flex;align-items:flex-start;gap:10px;padding:12px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;margin-bottom:10px}
  .chk input{width:24px;height:24px;flex-shrink:0;margin-top:2px}
  .chk label{font-size:14px;font-weight:600}
  .pledge{background:#FEF2F2;border:2px solid var(--warn);border-radius:10px;padding:12px;margin-bottom:10px}
  .pledge .ph{font-size:14px;font-weight:800;color:var(--warn);margin-bottom:8px}
  .pledge .chk{background:#fff;border-color:#FCA5A5}
  .agree{display:flex;align-items:flex-start;gap:10px;padding:12px;background:#EBF3FB;border:1px solid #BFDBFE;border-radius:10px}
  .agree input{width:24px;height:24px;flex-shrink:0;margin-top:2px}
  .agree label{font-size:14px;font-weight:700}
  .err{color:var(--red);font-size:13px;margin-top:6px;font-weight:600;display:none}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:24px}
  .modal.show{display:flex}
  .modal .box{background:#fff;border-radius:14px;padding:24px;max-width:380px;text-align:center}
  .modal .ic{font-size:46px}
  .modal .mt{font-size:18px;font-weight:800;color:var(--red);margin:8px 0}
  .modal .mb{font-size:14px;color:#374151;margin-bottom:18px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;opacity:0;transition:.3s;z-index:200;pointer-events:none;max-width:90%}
  .hidden{display:none!important}
  .imgmodal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;z-index:300;overflow:auto;padding:10px}
  .imgmodal.show{display:block}
  .imgmodal img{width:100%;max-width:1000px;margin:0 auto;display:block}
  .imgmodal .x{position:fixed;top:10px;right:16px;color:#fff;font-size:34px;cursor:pointer}
  .done{text-align:center;padding:40px 20px}
  .done .ic{font-size:60px}
  .done .h{font-size:22px;font-weight:800;color:var(--green);margin:10px 0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="t1" data-i="app_title"></div>
    <div class="t2">有限会社阪口商店</div>
    <div class="langbar" id="langbar">
      <button data-lang="ja" class="on" onclick="setLang('ja')">日本語</button>

    </div>

let LANG=localStorage.getItem('ci_lang')||'ja';
let EMP=null;

function tt(k){return (T[LANG]&&T[LANG][k])||T.ja[k]||k}
function applyLang(){
  document.documentElement.lang=LANG;
  document.querySelectorAll('[data-i]').forEach(el=>{el.textContent=tt(el.getAttribute('data-i'))});
  document.getElementById('sign').placeholder=tt('sign_ph');
  document.querySelectorAll('#langbar button').forEach(b=>b.classList.toggle('on',b.getAttribute('data-lang')===LANG));
}
function setLang(l){LANG=l;localStorage.setItem('ci_lang',l);applyLang()}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',3000)}
function showImg(src){document.getElementById('imgmodal-img').src=src;document.getElementById('imgmodal').classList.add('show')}

async function verify(){
  const id=(document.getElementById('emp-id').value||'').trim();
  const err=document.getElementById('login-err');
  err.style.display='none';
  if(!/^\d{7}$/.test(id)){err.textContent=tt('id_fmt');err.style.display='block';return}
  const btn=document.getElementById('btn-verify');
  btn.disabled=true;btn.textContent=tt('checking');
  try{
    const res=await fetch(`${GAS_URL}?action=verifyCrew&id=${encodeURIComponent(id)}`,{redirect:'follow'});
    const d=await res.json();
    if(!d.ok)throw new Error(d.error||'error');
    if(!d.found){document.getElementById('modal-block').classList.add('show');return}
    EMP=d.employee;
    startSign();
  }catch(e){
    err.textContent=tt('conn_err');err.style.display='block';
  }finally{
    btn.disabled=false;btn.textContent=tt('btn_confirm');
  }
}

function startSign(){
  document.getElementById('me-name').textContent=EMP.name;
  document.getElementById('me-sub').textContent=(EMP.store||'')+'｜'+(TYPE_NAME[EMP.type]||EMP.type||'');
  document.getElementById('view-login').classList.add('hidden');
  document.getElementById('view-survey').classList.remove('hidden');
  window.scrollTo(0,0);
}

function allChecked(){return ['r1','r2','p1','p2','agree'].every(id=>document.getElementById(id).checked)}
function signOK(){return (document.getElementById('sign').value||'').trim()===String(EMP.name).trim()}
function updateBtn(){
  document.getElementById('btn-submit').disabled=!(allChecked()&&signOK());
  const sv=(document.getElementById('sign').value||'').trim();
  document.getElementById('sign-err').style.display=(sv&&!signOK())?'block':'none';
}

async function submitSign(){
  if(!(allChecked()&&signOK())){toast('!');return}
  const btn=document.getElementById('btn-submit');
  btn.disabled=true;btn.textContent=tt('sending');
  const rec={
    '事案':INCIDENT_ID,'従業員番号':String(EMP.id),'氏名':EMP.name,'店舗':EMP.store,'雇用区分':EMP.type,
    '確認_レシート不正':'はい','確認_二重登録':'はい',
    '同意_懲戒解雇':'同意する','同意_損害賠償':'同意する',
    '電子署名':document.getElementById('sign').value.trim(),'言語':LANG,
    '同意日時':new Date().toISOString(),'状況':'Signed'
  };
  try{
    const res=await fetch(GAS_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'recordIncidentAck',record:rec})});
    const d=await res.json();
    if(!d.ok)throw new Error(d.error||'error');
    document.getElementById('view-survey').classList.add('hidden');
    document.getElementById('done-msg').textContent=tt('done_msg').replace('{name}',EMP.name);
    document.getElementById('view-done').classList.remove('hidden');
    window.scrollTo(0,0);
  }catch(e){
    document.getElementById('submit-err').textContent=tt('conn_err');
    btn.disabled=false;btn.textContent=tt('btn_submit');
  }
}

document.getElementById('emp-id').addEventListener('keydown',e=>{if(e.key==='Enter')verify()});
applyLang();
</script>
