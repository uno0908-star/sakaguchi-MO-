let curSC='組織全体', curStore=null, curSort='ms', sortDesc=true;

function getData(){
  if(curStore) return STORE_DATA[curStore]||{};
  if(curSC==='組織全体') return ORG_DATA;
  // SC集計: 配下店舗の合算平均
  const stores = SC_STORE_MAP[curSC]||[];
  if(!stores.length) return {};
  const n=stores.length;
  const merged={};
  MAIN_DEPTS.forEach(dept=>{
    let fs=0,ms=0,fg=0,mg=0,fh=0,mh=0,ny=0,syoy_s=[],gyoy_s=[];
    stores.forEach(s=>{
      const d=(STORE_DATA[s]||{})[dept]||{};
      fs+=d.fs||0; ms+=d.ms||0; fg+=d.fg||0; mg+=d.mg||0; fh+=d.fh||0; mh+=d.mh||0;
      ny+=d.ny||0;
      if(d.syoy) syoy_s.push(d.syoy);
      if(d.gyoy) gyoy_s.push(d.gyoy);
    });
    merged[dept]={
      fs:Math.round(fs/n*10)/10, ms:Math.round(ms/n*10)/10,
      mom_s:fs>0?Math.round(ms/fs*1000)/10:null,
      fg:Math.round(fg/n*10)/10, mg:Math.round(mg/n*10)/10,
      mom_g:fg>0?Math.round(mg/fg*1000)/10:null,
      fh:Math.round(fh/n*10)/10, mh:Math.round(mh/n*10)/10,
      mom_h:fh>0?Math.round(mh/fh*1000)/10:null,
      ny:Math.round(ny/n*100)/100,
      syoy:syoy_s.length?Math.round(syoy_s.reduce((a,b)=>a+b)/syoy_s.length*10)/10:null,
      gyoy:gyoy_s.length?Math.round(gyoy_s.reduce((a,b)=>a+b)/gyoy_s.length*10)/10:null,
    };
  });
  return merged;
}

function setSort(k){if(curSort===k)sortDesc=!sortDesc;else{curSort=k;sortDesc=k!=='dept';}render();}
function badge(v,inv=false){
  if(v===null||v===undefined)return'<span class="bna">—</span>';
  const g=inv?v<=100:v>=100;
  return`<span class="${g?'bup':'bdn'}">${g?'▲':'▼'} ${v.toFixed(1)}%</span>`;
}
function bar(v,max,c){if(!max||!v||v<=0)return'';const w=Math.min(v/max*100,100).toFixed(1);return`<span class="bw"><span class="bf" style="width:${w}%;background:${c}"></span></span>`;}
function fmt(n){return(n===null||n===undefined)?'—':n.toFixed(1);}

function getFiltered(){
  const data=getData(),cat=document.getElementById('filterCat').value,q=document.getElementById('search').value.trim();
  return MAIN_DEPTS.filter(dept=>{
    const d=data[dept];
    if(!d||(!d.fs&&!d.ms))return false;
    if(q&&!dept.includes(q))return false;
    if(cat==='food')return FOOD_D.has(dept);
    if(cat==='drink')return DRINK_D.has(dept);
    if(cat==='snack')return SNACK_D.has(dept);
    if(cat==='other')return!FOOD_D.has(dept)&&!DRINK_D.has(dept)&&!SNACK_D.has(dept);
    return true;
  }).map(dept=>({dept,...data[dept]}));
}

function render(){
  let rows=getFiltered();
  const k=curSort;
  rows.sort((a,b)=>{
    if(k==='dept')return sortDesc?b.dept.localeCompare(a.dept,'ja'):a.dept.localeCompare(b.dept,'ja');
    let va=a[k]??(sortDesc?-Infinity:Infinity),vb=b[k]??(sortDesc?-Infinity:Infinity);
    return sortDesc?vb-va:va-vb;
  });
  const mS=Math.max(...rows.map(r=>r.ms||0),1);
  const mG=Math.max(...rows.map(r=>r.mg||0),1);
  const mH=Math.max(...rows.map(r=>r.mh||0),1);

  document.getElementById('tbody').innerHTML=rows.map(r=>{
    const ny=r.ny>0?`<span class="ny">(値入${r.ny.toFixed(1)}%)</span>`:'';
    return`<tr>
      <td class="nm">${r.dept}</td>
      <td class="bc">${fmt(r.fs)}</td>
      <td class="bc" style="font-weight:700">${fmt(r.ms)}${bar(r.ms,mS,'#1e5fa8')}</td>
      <td class="bc">${badge(r.mom_s)}</td>
      <td class="bc">${badge(r.syoy)}</td>
      <td class="gc">${fmt(r.fg)}</td>
      <td class="gc" style="font-weight:700;color:#0a5a50">${fmt(r.mg)}${ny}</td>
      <td class="gc">${badge(r.gyoy)}</td>
      <td class="gc">${badge(r.mom_g)}</td>
      <td class="ac">${fmt(r.fh)}</td>
      <td class="ac" style="font-weight:700">${fmt(r.mh)}${r.mh>0?bar(r.mh,mH,'#c0392b'):''}</td>
      <td class="ac">${badge(r.mom_h,true)}</td>
      <td class="ac"><span class="bna">—</span></td>
    </tr>`;
  }).join('');

  const T=k=>rows.reduce((a,r)=>a+(r[k]||0),0);
  const tfs=T('fs'),tms=T('ms'),tfg=T('fg'),tmg=T('mg'),tfh=T('fh'),tmh=T('mh');
  const momS=tfs>0?tms/tfs*100:null,momG=tfg>0?tmg/tfg*100:null,momH=tfh>0?tmh/tfh*100:null;
  document.getElementById('tfoot').innerHTML=`<tr>
    <td class="nm">合計（${rows.length}カテゴリー）</td>
    <td>${tfs.toFixed(1)}</td><td>${tms.toFixed(1)}</td><td>${badge(momS)}</td><td>—</td>
    <td>${tfg.toFixed(1)}</td><td>${tmg.toFixed(1)}</td><td>—</td><td>${badge(momG)}</td>
    <td>${tfh.toFixed(1)}</td><td>${tmh.toFixed(1)}</td><td>${badge(momH,true)}</td><td>—</td>
  </tr>`;

  // サマリー
  const upS=rows.filter(r=>r.mom_s>=100).length;
  const upG=rows.filter(r=>r.gyoy>=100).length;
  const dnH=rows.filter(r=>r.mom_h!==null&&r.mom_h>100).length;
  document.getElementById('summaryBar').innerHTML=[
    {l:'3月売上合計/日',v:`${tms.toFixed(0)}千円`,s:`前月比 ${momS?momS.toFixed(1)+'%':'—'}`,cls:'',c:momS>=100?'var(--green)':'var(--red)'},
    {l:'売上前月比改善',v:`${upS}カテゴリー`,s:`悪化:${rows.filter(r=>r.mom_s!==null&&r.mom_s<100).length}`,cls:'g',c:'var(--green)'},
    {l:'3月荒利益合計/日',v:`${tmg.toFixed(0)}千円`,s:`前月比 ${momG?momG.toFixed(1)+'%':'—'}`,cls:'a',c:momG>=100?'var(--green)':'var(--red)'},
    {l:'荒利前年比改善',v:`${upG}カテゴリー`,s:`悪化:${rows.filter(r=>r.gyoy!==null&&r.gyoy<100).length}`,cls:'',c:'var(--green)'},
    {l:'3月廃棄合計/日',v:`${tmh.toFixed(1)}千円`,s:`前月比 ${momH?momH.toFixed(1)+'%':'—'}`,cls:'r',c:momH<=100?'var(--green)':'var(--red)'},
    {l:'廃棄増加カテゴリー',v:`${dnH}カテゴリー`,s:'前月比100%超',cls:'',c:'var(--red)'},
  ].map(x=>`<div class="sm ${x.cls}"><div class="sm-l">${x.l}</div><div class="sm-v" style="color:${x.c}">${x.v}</div><div class="sm-s">${x.s}</div></div>`).join('');

  // ビューラベル
  document.getElementById('viewLabel').textContent = curStore ? `📍 ${curStore}` : curSC==='組織全体' ? '📊 組織全体' : `📋 ${curSC}`;
}

// タブ描画
function buildTabs(){
  // 第1層：SC
  document.getElementById('tabs1').innerHTML=SC_ORDER.map(sc=>{
    const active=sc===curSC&&!curStore;
    return`<div class="tab1${active?' active':''}" onclick="selectSC('${sc}')">${sc}</div>`;
  }).join('');

  // 第2層：個店（SC選択時のみ）
  const stores = curSC==='組織全体' ? [] : (SC_STORE_MAP[curSC]||[]);
  document.getElementById('tabs2').innerHTML = stores.length ?
    stores.map(s=>{
      const active=s===curStore;
      return`<div class="tab2${active?' active':''}" onclick="selectStore('${s}')">${s}</div>`;
    }).join('') : '<div style="padding:6px 12px;font-size:10px;color:#93b8e0">← SCを選択すると個店タブが表示されます</div>';
}

function selectSC(sc){curSC=sc;curStore=null;buildTabs();render();}
function selectStore(s){curStore=s;buildTabs();render();}

buildTabs();render();
</script>
</body>
</html>
